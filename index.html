<!DOCTYPE html>
<html>
<head>
  <title>Happy Birthday Bubu ❤️</title>

  <style>
    body {
      margin: 0;
      overflow: hidden;
      font-family: 'Poppins', sans-serif;
      color: white;
      text-align: center;

      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      flex-direction: column;

      /* 🌌 Dark Night Gradient */
      background: linear-gradient(to top, #0f2027, #203a43, #2c5364);
    }

    h1 {
      font-size: 42px;
      margin-bottom: 10px;
      text-shadow: 0 0 10px #ff4d6d;
    }

    /* 💖 Glowing Photo */
    img {
      width: 220px;
      height: 220px;
      border-radius: 50%;
      border: 3px solid #fff;
      object-fit: cover;

      box-shadow: 0 0 20px #ff4d6d, 0 0 40px #ff4d6d, 0 0 60px #ff4d6d;
      animation: glow 2s infinite alternate;
    }

    @keyframes glow {
      0% { box-shadow: 0 0 10px #ff4d6d; }
      100% { box-shadow: 0 0 50px #ff85a2, 0 0 100px #ff4d6d; }
    }

    #text {
      font-size: 20px;
      margin-top: 20px;
      max-width: 90%;
      line-height: 1.6;
      text-shadow: 0 0 5px #000;
    }

    .btn {
      padding: 14px 25px;
      font-size: 20px;
      border: none;
      border-radius: 30px;
      background: #ff4d6d;
      color: white;
      cursor: pointer;
      margin-top: 25px;
      font-weight: bold;
      box-shadow: 0 0 15px #ff4d6d;
    }

    .cake {
      font-size: 70px;
      margin-top: 15px;
      animation: bounce 1s infinite;
      display: none;
    }

    @keyframes bounce {
      0%,100% {transform: translateY(0);}
      50% {transform: translateY(-10px);}
    }

    /* ❤️ Hearts */
    .heart {
      position: absolute;
      bottom: -10px;
      animation: float 5s linear infinite;
    }

    @keyframes float {
      0% {transform: translateY(0); opacity: 1;}
      100% {transform: translateY(-100vh); opacity: 0;}
    }

    /* 🌟 Stars */
    .star {
      position: absolute;
      width: 2px;
      height: 2px;
      background: white;
      animation: twinkle 2s infinite alternate;
    }

    @keyframes twinkle {
      from {opacity: 0.2;}
      to {opacity: 1;}
    }

    /* 💌 Popup */
    .popup {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.85);
      justify-content: center;
      align-items: center;
    }

    .popup-content {
      background: #111;
      color: #ff4d6d;
      padding: 25px;
      border-radius: 20px;
      text-align: center;
      width: 80%;
      font-size: 20px;
      box-shadow: 0 0 20px #ff4d6d;
    }

    .popup-content button {
      margin-top: 15px;
      padding: 10px 20px;
      border: none;
      border-radius: 20px;
      background: #ff4d6d;
      color: white;
      font-size: 16px;
    }
  </style>
</head>

<body>

<audio id="music" loop>
  <source src="https://cdn.pixabay.com/download/audio/2022/03/15/audio_115b9bdb0b.mp3">
</audio>

<h1>🌙 Happy Birthday Bubu ❤️</h1>

<img src="https://drive.google.com/uc?export=view&id=1FOWIKVlVn_3VOhmIiHzCsi6ZUKiUeQ9V">

<div id="cake" class="cake">🎂</div>

<div id="text"></div>

<button class="btn" onclick="startLove()">🎁 Click me Bubu 😍</button>

<!-- 💌 Popup -->
<div id="popup" class="popup">
  <div class="popup-content">
    💖 Tum meri life ka sabse beautiful part ho ❤️<br><br>
    Main hamesha tumse pyaar karta rahunga 💕<br>
    You are my moon in my dark sky 🌙✨
    <br><br>
    <button onclick="closePopup()">Close ❤️</button>
  </div>
</div>

<script>
  const message = `Dear Madhusmita (my cute Bubu),

Tu meri duniya hai ❤️  
Main tujhe bahut zyada pyaar karta hoon 💕  

Happy Birthday meri jaan 🌙💖`;

  let i = 0;

  function typeWriter() {
    if (i < message.length) {
      document.getElementById("text").innerHTML += message.charAt(i);
      i++;
      setTimeout(typeWriter, 40);
    }
  }

  function startLove() {
    document.getElementById("music").play();
    document.getElementById("cake").style.display = "block";
    document.getElementById("popup").style.display = "flex";
    typeWriter();
    createHearts();
  }

  function closePopup() {
    document.getElementById("popup").style.display = "none";
  }

  function createHearts() {
    setInterval(() => {
      let heart = document.createElement("div");
      heart.className = "heart";
      heart.innerHTML = "❤️";
      heart.style.left = Math.random() * 100 + "vw";
      heart.style.fontSize = (Math.random() * 20 + 10) + "px";
      document.body.appendChild(heart);

      setTimeout(() => heart.remove(), 5000);
    }, 300);
  }

  /* 🌟 Stars generator */
  setInterval(() => {
    let star = document.createElement("div");
    star.className = "star";
    star.style.left = Math.random() * 100 + "vw";
    star.style.top = Math.random() * 100 + "vh";
    document.body.appendChild(star);

    setTimeout(() => star.remove(), 2000);
  }, 100);
</script>

</body>
</html>
