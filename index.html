<!DOCTYPE html>
<html>
<head>
  <title>Happy Birthday Bubu ❤️</title>

  <style>
    body {
      margin: 0;
      overflow: hidden;
      font-family: 'Poppins', sans-serif;
      color: white;
      text-align: center;

      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      flex-direction: column;

      background: linear-gradient(to top, #0f2027, #203a43, #2c5364);
    }

    h1 {
      font-size: 42px;
      text-shadow: 0 0 10px #ff4d6d;
    }

    /* 🐻 Bear */
    img {
      width: 230px;
      height: 230px;
      border-radius: 50%;
      object-fit: cover;
      border: 3px solid white;

      box-shadow: 0 0 20px #ff4d6d, 0 0 40px #ff4d6d, 0 0 60px #ff4d6d;
      animation: glow 2s infinite alternate;
    }

    @keyframes glow {
      0% { box-shadow: 0 0 10px #ff4d6d; }
      100% { box-shadow: 0 0 50px #ff85a2, 0 0 100px #ff4d6d; }
    }

    #text {
      font-size: 20px;
      margin-top: 20px;
      max-width: 90%;
    }

    .btn {
      padding: 14px 25px;
      font-size: 20px;
      border: none;
      border-radius: 30px;
      background: #ff4d6d;
      color: white;
      margin-top: 25px;
      cursor: pointer;
    }

    .cake {
      font-size: 70px;
      display: none;
      animation: bounce 1s infinite;
    }

    @keyframes bounce {
      50% {transform: translateY(-10px);}
    }

    /* 💌 Popup */
    .popup {
      display: none;
      position: fixed;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.85);
      justify-content: center;
      align-items: center;
    }

    .popup-content {
      background: #111;
      color: #ff4d6d;
      padding: 25px;
      border-radius: 20px;
      width: 80%;
    }
  </style>
</head>

<body>

<audio id="music" loop>
  <source src="https://cdn.pixabay.com/download/audio/2022/03/15/audio_115b9bdb0b.mp3">
</audio>

<h1>🌙 Happy Birthday Bubu ❤️</h1>

<!-- 🐻 Bear Image -->
<img id="bear" src="https://media.tenor.com/8Q2b8V3YkXcAAAAi/milk-and-mocha-bear-couple.gif">

<div id="cake" class="cake">🎂</div>

<div id="text"></div>

<button class="btn" onclick="startLove()">🎁 Click me Bubu 😍</button>

<!-- 💌 Popup -->
<div id="popup" class="popup">
  <div class="popup-content">
    💖 You are my everything ❤️<br><br>
    I love you forever 💕
    <br><br>
    <button onclick="closePopup()">Close ❤️</button>
  </div>
</div>

<script>
  const message = `Dear Bubu,

Tu meri duniya hai ❤️  
Main tujhe bahut zyada pyaar karta hoon 💕  

Happy Birthday meri jaan 💖`;

  let i = 0;

  function typeWriter() {
    if (i < message.length) {
      document.getElementById("text").innerHTML += message.charAt(i);
      i++;
      setTimeout(typeWriter, 40);
    }
  }

  function startLove() {
    document.getElementById("music").play();
    document.getElementById("cake").style.display = "block";
    document.getElementById("popup").style.display = "flex";

    /* 💋 Change to kissing bear */
    document.getElementById("bear").src =
      "https://media.tenor.com/5WVq7S0f3bEAAAAi/milk-and-mocha-kiss.gif";

    typeWriter();
  }

  function closePopup() {
    document.getElementById("popup").style.display = "none";
  }
</script>

</body>
</html>
