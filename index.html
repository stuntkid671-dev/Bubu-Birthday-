<!DOCTYPE html>
<html>
<head>
  <title>Happy Birthday Bubu ❤️</title>

  <style>
    body {
      margin: 0;
      overflow: hidden;
      font-family: Arial;
      background: linear-gradient(to right, #ff9a9e, #fad0c4);
      color: white;
      text-align: center;
    }

    .box {
      margin-top: 30px;
      background: rgba(0,0,0,0.4);
      padding: 20px;
      border-radius: 20px;
      display: inline-block;
      width: 90%;
    }

    /* 💖 Glowing Photo */
    img {
      width: 200px;
      height: 200px;
      border-radius: 50%;
      margin: 10px;
      border: 4px solid white;
      object-fit: cover;

      box-shadow: 0 0 20px #ff4d6d, 0 0 40px #ff4d6d, 0 0 60px #ff4d6d;
      animation: glow 2s infinite alternate;
    }

    @keyframes glow {
      0% {
        box-shadow: 0 0 10px #ff4d6d, 0 0 20px #ff4d6d;
      }
      100% {
        box-shadow: 0 0 25px #ff85a2, 0 0 50px #ff4d6d, 0 0 75px #ff4d6d;
      }
    }

    .btn {
      padding: 12px 20px;
      font-size: 18px;
      border: none;
      border-radius: 25px;
      background: #ff4d6d;
      color: white;
      cursor: pointer;
      margin-top: 20px;
    }

    #text {
      font-size: 18px;
      margin-top: 15px;
      min-height: 150px;
    }

    .heart {
      position: absolute;
      bottom: -10px;
      color: red;
      animation: float 5s linear infinite;
    }

    @keyframes float {
      0% {transform: translateY(0); opacity: 1;}
      100% {transform: translateY(-100vh); opacity: 0;}
    }

    .cake {
      font-size: 60px;
      margin-top: 10px;
      animation: bounce 1s infinite;
      display: none;
    }

    @keyframes bounce {
      0%,100% {transform: translateY(0);}
      50% {transform: translateY(-10px);}
    }

    /* 💌 Popup */
    .popup {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.7);
      justify-content: center;
      align-items: center;
    }

    .popup-content {
      background: white;
      color: #ff4d6d;
      padding: 20px;
      border-radius: 20px;
      text-align: center;
      width: 80%;
      animation: pop 0.4s ease;
    }

    .popup-content button {
      margin-top: 15px;
      padding: 10px 15px;
      border: none;
      border-radius: 20px;
      background: #ff4d6d;
      color: white;
      cursor: pointer;
    }

    @keyframes pop {
      from {transform: scale(0.5); opacity: 0;}
      to {transform: scale(1); opacity: 1;}
    }
  </style>
</head>

<body>

<audio id="music" loop>
  <source src="https://cdn.pixabay.com/download/audio/2022/03/15/audio_115b9bdb0b.mp3" type="audio/mpeg">
</audio>

<div class="box">
  <h1>🎂 Happy Birthday Bubu ❤️</h1>

  <!-- ❤️ HER PHOTO -->
  <img src="https://drive.google.com/uc?export=view&id=1FOWIKVlVn_3VOhmIiHzCsi6ZUKiUeQ9V">

  <!-- 🎂 Cake -->
  <div id="cake" class="cake">🎂</div>

  <!-- 💌 Message -->
  <div id="text"></div>

  <!-- 🎁 Button -->
  <button class="btn" onclick="startLove()">🎁 Click me Bubu 😍</button>
</div>

<!-- 💌 Popup -->
<div id="popup" class="popup">
  <div class="popup-content">
    <h2>💖 For You Bubu 💖</h2>
    <p>
      Tum meri life ka sabse beautiful part ho ❤️<br><br>
      Main har din bas tumhe hi chahunga 💕<br>
      Aur hamesha tumhare saath rahunga 💫
    </p>
    <button onclick="closePopup()">Close ❤️</button>
  </div>
</div>

<script>
  const message = `Dear Madhusmita (my cute Bubu),

Aaj ka din duniya ka sabse special din hai...
kyunki aaj meri life ka sabse important person paida hua tha 💖

Tu meri happiness hai, meri habit hai,
aur thodi si meri problem bhi 😜

Main tujhe bahut zyada pyaar karta hoon ❤️

Happy Birthday meri Bubu ❤️
Forever yours,
Puchu (Arav) 💕`;

  let i = 0;

  function typeWriter() {
    if (i < message.length) {
      document.getElementById("text").innerHTML += message.charAt(i);
      i++;
      setTimeout(typeWriter, 40);
    }
  }

  function startLove() {
    document.getElementById("music").play();
    document.getElementById("cake").style.display = "block";
    document.getElementById("popup").style.display = "flex";
    typeWriter();
    createHearts();
  }

  function closePopup() {
    document.getElementById("popup").style.display = "none";
  }

  function createHearts() {
    setInterval(() => {
      let heart = document.createElement("div");
      heart.className = "heart";
      heart.innerHTML = "❤️";
      heart.style.left = Math.random() * 100 + "vw";
      heart.style.fontSize = (Math.random() * 20 + 10) + "px";
      document.body.appendChild(heart);

      setTimeout(() => heart.remove(), 5000);
    }, 300);
  }
</script>

</body>
</html>
