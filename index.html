<!DOCTYPE html>
<html>
<head>
  <title>Happy Birthday Bubu ❤️</title>

  <link href="https://fonts.googleapis.com/css2?family=Poppins&display=swap" rel="stylesheet">

  <style>
    body {
      margin: 0;
      overflow: hidden;
      font-family: 'Poppins', sans-serif;
      color: white;
      text-align: center;

      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      flex-direction: column;

      background: linear-gradient(to top, #000000, #050505, #0a0a0a);
    }

    h1 {
      font-size: 55px;
      text-shadow: 0 0 15px #ff4d6d;
    }

    .name {
      font-size: 40px;
      color: #ff4d6d;
      animation: glowText 1.5s infinite alternate;
    }

    @keyframes glowText {
      from { text-shadow: 0 0 10px #ff4d6d; }
      to { text-shadow: 0 0 30px #ff85a2, 0 0 60px #ff4d6d; }
    }

    img {
      width: 260px;
      height: 260px;
      border-radius: 50%;
      object-fit: cover;
      border: 3px solid white;

      box-shadow: 0 0 20px #ff4d6d, 0 0 40px #ff4d6d, 0 0 60px #ff4d6d;
      animation: glow 2s infinite alternate;
    }

    @keyframes glow {
      0% { box-shadow: 0 0 10px #ff4d6d; }
      100% { box-shadow: 0 0 60px #ff85a2, 0 0 120px #ff4d6d; }
    }

    #text {
      font-size: 26px;
      margin-top: 25px;
      max-width: 90%;
      white-space: pre-line;
    }

    .btn {
      padding: 16px 30px;
      font-size: 24px;
      border: none;
      border-radius: 30px;
      background: #ff4d6d;
      color: white;
      margin-top: 30px;
      cursor: pointer;
    }

    .cake {
      font-size: 90px;
      display: none;
      animation: bounce 1s infinite;
    }

    @keyframes bounce {
      50% { transform: translateY(-12px); }
    }

    .popup {
      display: none;
      position: fixed;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.9);
      justify-content: center;
      align-items: center;
    }

    .popup-content {
      background: #111;
      color: #ff4d6d;
      padding: 30px;
      border-radius: 20px;
      width: 85%;
      font-size: 24px;
    }

    .heart {
      position: fixed;
      bottom: -10px;
      font-size: 20px;
      animation: floatUp 5s linear infinite;
    }

    @keyframes floatUp {
      100% {
        transform: translateY(-100vh);
        opacity: 0;
      }
    }
  </style>
</head>

<body>

<audio id="music" loop>
  <source src="https://cdn.pixabay.com/download/audio/2022/03/15/audio_115b9bdb0b.mp3">
</audio>

<h1>🌙 Happy Birthday</h1>
<div class="name">Bubu (Madhusmita) ❤️</div>

<!-- 🌸 Cute big eyes cartoon girl -->
<img id="bear" src="https://i.imgur.com/3ZQ3Z6F.png">

<div id="cake" class="cake">🎂</div>

<div id="text"></div>

<button class="btn" onclick="startLove()">🎁 Click me 😍</button>

<div id="popup" class="popup">
  <div class="popup-content">
    💖 You are my everything ❤️<br><br>
    I love you forever 💕<br><br>
    <button onclick="closePopup()">Close ❤️</button>
  </div>
</div>

<script>
  const message = `Dear Bubu (Madhusmita),

Tu meri duniya hai ❤️  
Main tujhe bahut zyada pyaar karta hoon 💕  

Happy Birthday meri jaan 💖`;

  let i = 0;

  function typeWriter() {
    if (i < message.length) {
      document.getElementById("text").innerHTML += message.charAt(i);
      i++;
      setTimeout(typeWriter, 40);
    }
  }

  function createHearts() {
    setInterval(() => {
      const heart = document.createElement("div");
      heart.className = "heart";
      heart.innerHTML = "💖";
      heart.style.left = Math.random() * 100 + "vw";
      document.body.appendChild(heart);

      setTimeout(() => heart.remove(), 5000);
    }, 300);
  }

  function startLove() {
    document.getElementById("music").play().catch(() => {});
    document.getElementById("cake").style.display = "block";
    document.getElementById("popup").style.display = "flex";

    // 💕 Optional: change image on click (same for stability)
    document.getElementById("bear").src =
      "https://i.imgur.com/3ZQ3Z6F.png";

    typeWriter();
    createHearts();
  }

  function closePopup() {
    document.getElementById("popup").style.display = "none";
  }

  window.onload = () => {
    setTimeout(startLove, 1000);
  };
</script>

</body>
</html>
